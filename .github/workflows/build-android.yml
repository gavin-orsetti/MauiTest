name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Android workload
        run: dotnet workload install android maui-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore
        run: dotnet restore MauiTest/MauiTest.csproj -p:TargetFramework=net10.0-android

      - name: Publish Android APK (arm64-v8a)
        run: >
          dotnet publish MauiTest/MauiTest.csproj
          -f net10.0-android
          -c Debug
          -r android-arm64
          --no-restore
          -p:AndroidPackageFormat=apk
          -p:AndroidSdkDirectory=$ANDROID_HOME

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MauiTest-debug.apk
          path: '**/*.apk'
          retention-days: 7
          if-no-files-found: error
